name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release artifacts
        run: make build

      # CHANGELOG.md があれば自動で本文に使う
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # コミット履歴から自動生成
          # files: |                    # 成果物をアタッチする場合はコメント解除
          #   dist/**
